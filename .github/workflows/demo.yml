name: ai-risk-demo

on:
  workflow_dispatch:
  push:

jobs:

  analyze:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4
      - name: Install Pluto
        run: |
          curl -L https://github.com/FairwindsOps/pluto/releases/latest/download/pluto_linux_amd64.tar.gz -o pluto.tar.gz
          tar -xzf pluto.tar.gz
          chmod +x pluto
          sudo mv pluto /usr/local/bin/

      - name: Run Pluto
        run: |
          /usr/local/bin/pluto detect-files -d manifest/

      - name: Run AI Analyzer
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

        run: |
          pip install openai
          python risk-engine/analyze.py

      - name: Run Tests
        run: |
          pip install pytest kubernetes
          pytest tests/

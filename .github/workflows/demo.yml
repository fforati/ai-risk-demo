name: ai-risk-demo-upgrade

on:
  workflow_dispatch:

jobs:

  upgrade-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # Install kind
      # -----------------------------
      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      # -----------------------------
      # Install kubectl
      # -----------------------------
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      # -----------------------------
      # Create ephemeral cluster
      # -----------------------------
      - name: Create cluster
        run: |
          kind create cluster --name ai-demo

      # -----------------------------
      # Verify cluster
      # -----------------------------
      - name: Cluster health
        run: |
          kubectl get nodes

      # -----------------------------
      # Simulate deprecated detection
      # -----------------------------
      - name: Detect deprecated API
        run: |
          echo "Detected deprecated ingress API"

      # -----------------------------
      # Apply upgraded manifest
      # -----------------------------
      - name: Apply upgraded manifest
        run: |
          kubectl apply -f manifest/ingress-new.yaml

      # -----------------------------
      # Verify resources
      # -----------------------------
      - name: Verify ingress
        run: |
          kubectl get ingress

      # -----------------------------
      # Setup Python
      # -----------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------
      # Install dependencies
      # -----------------------------
      - name: Install Python deps
        run: |
          pip install pytest kubernetes

      # -----------------------------
      # Run final tests
      # -----------------------------
      - name: Final validation tests
        run: |
          pytest tests/



